{% extends "base.html" %}

{% block title %}Pipeline Config — AgentCeption{% endblock %}

{% block head %}
<style>
  .config-layout {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    max-width: 720px;
  }

  .config-section {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .config-section h2 {
    font-size: 0.9rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin: 0 0 0.25rem 0;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .slider-row label {
    flex: 0 0 200px;
    font-size: 0.88rem;
    color: var(--text-primary);
  }

  .slider-row input[type="range"] {
    flex: 1;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .slider-row .slider-value {
    flex: 0 0 2rem;
    text-align: right;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--accent);
    font-family: monospace;
  }

  /* ── Label order editor ─────────────────────────────────────────────────── */

  .label-list {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .label-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.4rem 0.6rem;
    cursor: grab;
    user-select: none;
    transition: background 0.1s, border-color 0.1s;
  }

  .label-item:active {
    cursor: grabbing;
  }

  .label-item.drag-over {
    border-color: var(--accent);
    background: var(--bg-tertiary);
  }

  .drag-handle {
    font-size: 0.8rem;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .label-item__text {
    flex: 1;
    font-size: 0.85rem;
    font-family: monospace;
    color: var(--text-primary);
    word-break: break-all;
  }

  .btn-remove {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 0.1rem 0.3rem;
    border-radius: 3px;
    line-height: 1;
    transition: color 0.1s, background 0.1s;
    flex-shrink: 0;
  }

  .btn-remove:hover {
    color: var(--danger);
    background: rgba(248, 81, 73, 0.12);
  }

  .label-add-row {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.25rem;
  }

  .label-add-row input[type="text"] {
    flex: 1;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-primary);
    font-size: 0.85rem;
    font-family: monospace;
    padding: 0.35rem 0.6rem;
    outline: none;
    transition: border-color 0.1s;
  }

  .label-add-row input[type="text"]:focus {
    border-color: var(--accent);
  }

  .btn-add-label {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-primary);
    cursor: pointer;
    font-size: 0.82rem;
    padding: 0.35rem 0.75rem;
    white-space: nowrap;
    transition: background 0.1s, border-color 0.1s;
  }

  .btn-add-label:hover {
    background: var(--bg-tertiary);
    border-color: var(--accent);
  }

  /* ── Save button and toast ───────────────────────────────────────────────── */

  .config-footer {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .btn-save-config {
    background: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 4px;
    color: #fff;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 0.5rem 1.25rem;
    transition: opacity 0.1s;
  }

  .btn-save-config:hover {
    opacity: 0.85;
  }

  .btn-save-config:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .config-toast {
    font-size: 0.85rem;
    padding: 0.35rem 0.75rem;
    border-radius: 4px;
    display: none;
  }

  .config-toast.ok {
    display: inline-block;
    background: rgba(76, 175, 80, 0.15);
    color: #81c784;
    border: 1px solid rgba(76, 175, 80, 0.35);
  }

  .config-toast.err {
    display: inline-block;
    background: rgba(244, 67, 54, 0.15);
    color: #e57373;
    border: 1px solid rgba(244, 67, 54, 0.35);
  }
</style>
{% endblock %}

{% block content %}
<div class="config-layout"
     x-data='configPanel({{ config.model_dump() | tojson if config else "null" }})'
     x-init="init()">

  <!-- ── Allocation sliders ────────────────────────────────────────────────── -->
  <div class="config-section">
    <h2>Allocation</h2>

    <div class="slider-row">
      <label for="slider-eng-vps">Max Engineering VPs</label>
      <input id="slider-eng-vps"
             type="range" min="1" max="4" step="1"
             x-model.number="config.max_eng_vps"
             aria-label="Max Engineering VPs" />
      <span class="slider-value" x-text="config.max_eng_vps"></span>
    </div>

    <div class="slider-row">
      <label for="slider-qa-vps">Max QA VPs</label>
      <input id="slider-qa-vps"
             type="range" min="1" max="4" step="1"
             x-model.number="config.max_qa_vps"
             aria-label="Max QA VPs" />
      <span class="slider-value" x-text="config.max_qa_vps"></span>
    </div>

    <div class="slider-row">
      <label for="slider-pool-size">Pool size per VP</label>
      <input id="slider-pool-size"
             type="range" min="1" max="8" step="1"
             x-model.number="config.pool_size_per_vp"
             aria-label="Pool size per VP" />
      <span class="slider-value" x-text="config.pool_size_per_vp"></span>
    </div>
  </div>

  <!-- ── Label order editor ────────────────────────────────────────────────── -->
  <div class="config-section">
    <h2>Label order</h2>

    <ul class="label-list"
        id="label-list"
        aria-label="Active labels ordered by priority">
      <template x-for="(label, idx) in config.active_labels_order" :key="label">
        <li class="label-item"
            draggable="true"
            :data-idx="idx"
            @dragstart="onDragStart($event, idx)"
            @dragover.prevent="onDragOver($event, idx)"
            @dragleave="onDragLeave($event)"
            @drop.prevent="onDrop($event, idx)"
            @dragend="onDragEnd()">
          <span class="drag-handle" aria-hidden="true">⠿</span>
          <span class="label-item__text" x-text="label"></span>
          <button class="btn-remove"
                  type="button"
                  :aria-label="'Remove ' + label"
                  @click="removeLabel(idx)">✕</button>
        </li>
      </template>
    </ul>

    <div class="label-add-row">
      <input id="new-label-input"
             type="text"
             placeholder="e.g. agentception/7-new-phase"
             x-model.trim="newLabel"
             @keydown.enter="addLabel()"
             aria-label="New label name" />
      <button class="btn-add-label"
              type="button"
              @click="addLabel()">Add label</button>
    </div>
  </div>

  <!-- ── Save + toast ──────────────────────────────────────────────────────── -->
  <div class="config-footer">
    <button class="btn-save-config"
            type="button"
            :disabled="saving"
            @click="save()"
            x-text="saving ? 'Saving…' : 'Save'">Save</button>

    <span class="config-toast"
          :class="toast.cls"
          x-text="toast.msg"
          id="config-toast"
          role="status"
          aria-live="polite"></span>
  </div>

</div>

{# configPanel() lives in /static/app.js #}
{% endblock %}
