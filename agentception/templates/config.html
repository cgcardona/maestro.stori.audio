{% extends "base.html" %}

{% block title %}Pipeline Config — AgentCeption{% endblock %}

{% block head %}
<style>
  .config-layout {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    max-width: 720px;
  }

  .config-section {
    background: var(--color-card, #1e1e2e);
    border: 1px solid var(--color-border, #333);
    border-radius: 6px;
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .config-section h2 {
    font-size: 0.9rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--color-muted, #888);
    margin: 0 0 0.25rem 0;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--color-border, #333);
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .slider-row label {
    flex: 0 0 200px;
    font-size: 0.88rem;
    color: var(--color-text, #e0e0e0);
  }

  .slider-row input[type="range"] {
    flex: 1;
    accent-color: var(--color-accent, #7c6af7);
    cursor: pointer;
  }

  .slider-row .slider-value {
    flex: 0 0 2rem;
    text-align: right;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--color-accent, #7c6af7);
    font-family: var(--font-mono, monospace);
  }

  /* ── Label order editor ─────────────────────────────────────────────────── */

  .label-list {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .label-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--color-card-hover, #252535);
    border: 1px solid var(--color-border, #333);
    border-radius: 4px;
    padding: 0.4rem 0.6rem;
    cursor: grab;
    user-select: none;
    transition: background 0.1s, border-color 0.1s;
  }

  .label-item:active {
    cursor: grabbing;
  }

  .label-item.drag-over {
    border-color: var(--color-accent, #7c6af7);
    background: var(--color-card-active, #252545);
  }

  .drag-handle {
    font-size: 0.8rem;
    color: var(--color-muted, #666);
    flex-shrink: 0;
  }

  .label-item__text {
    flex: 1;
    font-size: 0.85rem;
    font-family: var(--font-mono, monospace);
    color: var(--color-text, #e0e0e0);
    word-break: break-all;
  }

  .btn-remove {
    background: transparent;
    border: none;
    color: var(--color-muted, #888);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 0.1rem 0.3rem;
    border-radius: 3px;
    line-height: 1;
    transition: color 0.1s, background 0.1s;
    flex-shrink: 0;
  }

  .btn-remove:hover {
    color: #f44336;
    background: rgba(244, 67, 54, 0.12);
  }

  .label-add-row {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.25rem;
  }

  .label-add-row input[type="text"] {
    flex: 1;
    background: var(--color-card-hover, #252535);
    border: 1px solid var(--color-border, #444);
    border-radius: 4px;
    color: var(--color-text, #e0e0e0);
    font-size: 0.85rem;
    font-family: var(--font-mono, monospace);
    padding: 0.35rem 0.6rem;
    outline: none;
    transition: border-color 0.1s;
  }

  .label-add-row input[type="text"]:focus {
    border-color: var(--color-accent, #7c6af7);
  }

  .btn-add-label {
    background: var(--color-card, #1e1e2e);
    border: 1px solid var(--color-border, #444);
    border-radius: 4px;
    color: var(--color-text, #e0e0e0);
    cursor: pointer;
    font-size: 0.82rem;
    padding: 0.35rem 0.75rem;
    white-space: nowrap;
    transition: background 0.1s, border-color 0.1s;
  }

  .btn-add-label:hover {
    background: var(--color-card-hover, #2a2a3e);
    border-color: var(--color-accent, #7c6af7);
  }

  /* ── Save button and toast ───────────────────────────────────────────────── */

  .config-footer {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .btn-save-config {
    background: var(--color-accent, #7c6af7);
    border: 1px solid var(--color-accent, #7c6af7);
    border-radius: 4px;
    color: #fff;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 0.5rem 1.25rem;
    transition: opacity 0.1s;
  }

  .btn-save-config:hover {
    opacity: 0.85;
  }

  .btn-save-config:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .config-toast {
    font-size: 0.85rem;
    padding: 0.35rem 0.75rem;
    border-radius: 4px;
    display: none;
  }

  .config-toast.ok {
    display: inline-block;
    background: rgba(76, 175, 80, 0.15);
    color: #81c784;
    border: 1px solid rgba(76, 175, 80, 0.35);
  }

  .config-toast.err {
    display: inline-block;
    background: rgba(244, 67, 54, 0.15);
    color: #e57373;
    border: 1px solid rgba(244, 67, 54, 0.35);
  }
</style>
{% endblock %}

{% block content %}
<div class="config-layout"
     x-data="configPanel()"
     x-init="init()">

  <!-- ── Allocation sliders ────────────────────────────────────────────────── -->
  <div class="config-section">
    <h2>Allocation</h2>

    <div class="slider-row">
      <label for="slider-eng-vps">Max Engineering VPs</label>
      <input id="slider-eng-vps"
             type="range" min="1" max="4" step="1"
             x-model.number="config.max_eng_vps"
             aria-label="Max Engineering VPs" />
      <span class="slider-value" x-text="config.max_eng_vps"></span>
    </div>

    <div class="slider-row">
      <label for="slider-qa-vps">Max QA VPs</label>
      <input id="slider-qa-vps"
             type="range" min="1" max="4" step="1"
             x-model.number="config.max_qa_vps"
             aria-label="Max QA VPs" />
      <span class="slider-value" x-text="config.max_qa_vps"></span>
    </div>

    <div class="slider-row">
      <label for="slider-pool-size">Pool size per VP</label>
      <input id="slider-pool-size"
             type="range" min="1" max="8" step="1"
             x-model.number="config.pool_size_per_vp"
             aria-label="Pool size per VP" />
      <span class="slider-value" x-text="config.pool_size_per_vp"></span>
    </div>
  </div>

  <!-- ── Label order editor ────────────────────────────────────────────────── -->
  <div class="config-section">
    <h2>Label order</h2>

    <ul class="label-list"
        id="label-list"
        aria-label="Active labels ordered by priority">
      <template x-for="(label, idx) in config.active_labels_order" :key="label">
        <li class="label-item"
            draggable="true"
            :data-idx="idx"
            @dragstart="onDragStart($event, idx)"
            @dragover.prevent="onDragOver($event, idx)"
            @dragleave="onDragLeave($event)"
            @drop.prevent="onDrop($event, idx)"
            @dragend="onDragEnd()">
          <span class="drag-handle" aria-hidden="true">⠿</span>
          <span class="label-item__text" x-text="label"></span>
          <button class="btn-remove"
                  type="button"
                  :aria-label="'Remove ' + label"
                  @click="removeLabel(idx)">✕</button>
        </li>
      </template>
    </ul>

    <div class="label-add-row">
      <input id="new-label-input"
             type="text"
             placeholder="e.g. agentception/7-new-phase"
             x-model.trim="newLabel"
             @keydown.enter="addLabel()"
             aria-label="New label name" />
      <button class="btn-add-label"
              type="button"
              @click="addLabel()">Add label</button>
    </div>
  </div>

  <!-- ── Save + toast ──────────────────────────────────────────────────────── -->
  <div class="config-footer">
    <button class="btn-save-config"
            type="button"
            :disabled="saving"
            @click="save()"
            x-text="saving ? 'Saving…' : 'Save'">Save</button>

    <span class="config-toast"
          :class="toast.cls"
          x-text="toast.msg"
          id="config-toast"
          role="status"
          aria-live="polite"></span>
  </div>

</div>

<script>
  function configPanel() {
    return {
      config: {{ config.model_dump() | tojson | safe if config else '{"max_eng_vps":1,"max_qa_vps":1,"pool_size_per_vp":4,"active_labels_order":[]}' | safe }},
      newLabel: '',
      saving: false,
      toast: { msg: '', cls: '' },

      // Drag-and-drop state
      _dragIdx: null,

      async init() {
        try {
          const r = await fetch('/api/config');
          if (!r.ok) throw new Error('HTTP ' + r.status);
          this.config = await r.json();
        } catch (err) {
          this._showToast('Failed to load config: ' + err.message, 'err');
        }
      },

      addLabel() {
        const label = this.newLabel.trim();
        if (!label) return;
        if (this.config.active_labels_order.includes(label)) {
          this._showToast('Label already in list.', 'err');
          return;
        }
        this.config.active_labels_order.push(label);
        this.newLabel = '';
      },

      removeLabel(idx) {
        this.config.active_labels_order.splice(idx, 1);
      },

      // ── Drag-and-drop reorder ─────────────────────────────────────────────

      onDragStart(evt, idx) {
        this._dragIdx = idx;
        evt.dataTransfer.effectAllowed = 'move';
        evt.dataTransfer.setData('text/plain', String(idx));
      },

      onDragOver(evt, idx) {
        evt.currentTarget.classList.add('drag-over');
      },

      onDragLeave(evt) {
        evt.currentTarget.classList.remove('drag-over');
      },

      onDrop(evt, targetIdx) {
        evt.currentTarget.classList.remove('drag-over');
        const srcIdx = this._dragIdx;
        if (srcIdx === null || srcIdx === targetIdx) return;
        const arr = this.config.active_labels_order;
        const [item] = arr.splice(srcIdx, 1);
        arr.splice(targetIdx, 0, item);
        this._dragIdx = null;
      },

      onDragEnd() {
        // Clean up any lingering drag-over highlights
        document.querySelectorAll('.label-item.drag-over').forEach(function(el) {
          el.classList.remove('drag-over');
        });
        this._dragIdx = null;
      },

      // ── Save ──────────────────────────────────────────────────────────────

      async save() {
        this.saving = true;
        this._showToast('', '');
        try {
          const r = await fetch('/api/config', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(this.config),
          });
          if (!r.ok) {
            const detail = await r.json().then(function(d) {
              return d.detail || r.statusText;
            }).catch(function() {
              return r.statusText;
            });
            throw new Error(detail);
          }
          this.config = await r.json();
          this._showToast('✅ Config saved.', 'ok');
        } catch (err) {
          this._showToast('Save failed: ' + err.message, 'err');
        } finally {
          this.saving = false;
        }
      },

      _showToast(msg, cls) {
        this.toast = { msg, cls };
      },
    };
  }
</script>
{% endblock %}
