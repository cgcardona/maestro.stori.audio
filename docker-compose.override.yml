# docker-compose.override.yml — local development only
#
# Auto-merged by `docker compose up` (no -f flag needed).
# Production: `docker compose -f docker-compose.yml up` skips this file.
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │  REBUILD GUIDE — when do you need `docker compose build <service>`? │
# ├─────────────────────────────────────────────────────────────────────┤
# │  REBUILD REQUIRED          │  NO REBUILD — live via bind-mount      │
# ├────────────────────────────┼────────────────────────────────────────┤
# │  requirements.txt changed  │  maestro/**/*.py                       │
# │  Dockerfile changed        │  tests/**/*.py                         │
# │  New top-level dir added   │  scripts/**                            │
# │  (not yet in volumes below)│  alembic/**                            │
# │                            │  /worktrees/<id>/**  (worktrees)       │
# │                            │  tourdeforce/**                  │
# │                            │  tools/**                              │
# │                            │  pyproject.toml                        │
# │                            │  storpheus/**/*.py                     │
# └────────────────────────────┴────────────────────────────────────────┘
#
# Bind-mounts shadow the COPY'd code in the image — host edits are
# immediately visible inside the container with zero restart needed.
# The baked image layer only matters for dependencies (wheels/pip installs).

services:
  maestro:
    volumes:
      - maestro_data:/data
      - ./maestro:/app/maestro
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - ./tools:/app/tools
      - ./alembic:/app/alembic
      - ./tourdeforce:/app/tourdeforce
      - ./pyproject.toml:/app/pyproject.toml
      # .cursor/ — mounted so `generate.py` can write prompt files from inside the container.
      # Run the generator with: docker compose exec maestro python3 /app/scripts/gen_prompts/generate.py
      - ./.cursor:/app/.cursor
      # Cursor worktrees — agents run mypy/pytest directly against their worktree
      # via PYTHONPATH=/worktrees/<id>. No file copies needed. See .cursor/PARALLEL_ISSUE_TO_PR.md.
      - ${HOME}/.cursor/worktrees/maestro:/worktrees

  storpheus:
    volumes:
      - storpheus_cache:/data/cache
      - ./storpheus:/app
      # Cursor worktrees — parallel review agents need this to run mypy/pytest
      # against their worktree storpheus files via "cd /worktrees/<id> && mypy ."
      - ${HOME}/.cursor/worktrees/maestro:/worktrees

  agentception:
    environment:
      # Host keychain token passed in so gh CLI works inside the container.
      # The hosts.yml mount is read-only and contains no token when the host
      # uses the macOS Keychain — so we pass the token explicitly here.
      GH_TOKEN: ${GH_TOKEN}
      # Tell AgentCeption where the git repo root and worktrees live inside the
      # container. AC_REPO_DIR must point at a real git checkout so that
      # `git worktree add` works. AC_WORKTREES_DIR must match the bind-mount
      # below so spawned worktrees land on the host at the expected path.
      AC_REPO_DIR: /repo
      AC_WORKTREES_DIR: /worktrees
    volumes:
      # Live code — host edits are instantly visible; no rebuild needed
      - ./agentception:/app/agentception
      # .cursor/ — mounted so pipeline-config.json and role files are readable
      # by get_active_label(), read_pipeline_config(), and the spawn endpoint.
      - ./.cursor:/app/.cursor:ro
      # Full git repo — required so `git worktree add` can run inside the container.
      # Mounted at /repo so AC_REPO_DIR=/repo resolves to a real .git directory.
      - .:/repo
      # Worktrees — spawned worktrees are created here; shared with the host so
      # Cursor Tasks launched on the host can see the worktree paths immediately.
      - ${HOME}/.cursor/worktrees/maestro:/worktrees
